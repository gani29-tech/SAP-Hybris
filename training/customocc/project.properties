
# 2. This is the MOST important line for yocc.
# It tells the platform: "Include my controllers in the /occ/v2/ URL path."
customocc.occ.rewrite.url.patterns=/v2/.*

# 3. Specify where your Web Spring config is (for Controllers)
customocc.web-spring-context=customocc-web-spring.xml

# 4. Global context (for Facades/Services)
customocc.application-context=customocc-spring.xml